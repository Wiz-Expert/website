<!DOCTYPE html>

<head>

body{font-family:'Poppins',sans-serif;background:#3340FA;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:24px}
